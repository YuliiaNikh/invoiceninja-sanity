# Also runs when Sanity calls GitHub repository_dispatch (see comment at bottom).
name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-content-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# --- Redeploy when Studio content is published (recommended over GitHub Releases) ---
# 1. GitHub: Settings → Developer settings → Personal access tokens
#    Classic: enable scope "repo" (or "public_repo" for a public repo).
#    Fine-grained: Repository access → this repo → Permissions → Contents: Read and write.
# 2. sanity.io/manage → your project → API → Webhooks → Create:
#    URL:    https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#    Method: POST
#    Trigger: Create / Update / Delete on published documents (defaults skip drafts).
#    Filter (optional, only site content): _type in ["page","settings"]
#    Projection (body must match GitHub’s API):
#      {"event_type":"sanity-content-updated","client_payload":{"source":"sanity"}}
#    HTTP headers:
#      Accept: application/vnd.github+json
#      X-GitHub-Api-Version: 2022-11-28
#      Authorization: Bearer <YOUR_GITHUB_TOKEN>
# 3. Use the webhook “Attempts” log if GitHub returns 401/404 (wrong token or URL).
